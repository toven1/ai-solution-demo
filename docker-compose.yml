services:
  postgres:
    image: postgres:16-alpine
    container_name: founderos-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: founderos_ai
    ports:
      - "5432:5432"
    volumes:
      - founderos-ai-postgres-data:/var/lib/postgresql/data

volumes:
  founderos-ai-postgres-data:
